services:
  redis:
    image: redis:7-alpine
    container_name: personal-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - personal-ai-network

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: personal-ai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - personal-ai-network

  # LLM Runtime
  ollama:
    image: ollama/ollama:latest
    container_name: personal-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - personal-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Optional: uncomment to pull models on startup
    # profiles:
    #   - init

  # App service (FastAPI + built React frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: personal-ai-app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000}
      - DEBUG=false
      - ENABLE_ADAPTER_CACHE=true
      - ADAPTER_CACHE_BACKEND=redis
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - ollama
      - qdrant
      - redis
    networks:
      - personal-ai-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  prometheus:
    image: prom/prometheus:latest
    container_name: personal-ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
    networks:
      - personal-ai-network

  grafana:
    image: grafana/grafana:latest
    container_name: personal-ai-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - personal-ai-network

networks:
  personal-ai-network:
    driver: bridge

volumes:
  redis_data:
  qdrant_storage:
  ollama_data:
  prometheus_data:
  grafana_data:
