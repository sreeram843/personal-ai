[pytest]
addopts = --cov=app --cov=api --cov-report=term-missing --cov-fail-under=35
testpaths = tests
filterwarnings =
	ignore:Api key is used with unsecure connection\.:UserWarning:qdrant_client\.qdrant_remote
	ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
